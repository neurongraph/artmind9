name: banking_reference
description: Operational reference materials for FirstUK Bank — covering live interest rate schedules, incident response plans, technology production runbooks, application landscape documents, and customer welcome packs. Documents that staff and customers consult for quick, authoritative lookups.

entities_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational reference document analysis.
  Your job is to read a passage from a FirstUK Bank reference document and identify all significant entities.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ENTITY TYPES YOU MUST EXTRACT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Use ONLY these entity_classes. However, you can add more to the type values than the examples provided here.

  RATE_ENTRY
    A specific published interest rate, overdraft rate, or fee as recorded in the live rate schedule — the authoritative, date-stamped version. Include the product, balance tier (if applicable), rate value, effective date, and rate basis as a single entity. Also capture calculation examples as part of the entity description.
    example type values: savings_rate_tier | overdraft_rate | mortgage_rate | variable_rate | fixed_rate | fee_table_entry | rate_basis

  INCIDENT_TYPE
    A named category or scenario of operational incident, security event, or system failure with defining characteristics and examples. Each top-level incident category (Cybersecurity Incident, Data Breach, System Incident, etc.) is a separate entity. Also extract specific subtypes (e.g., Ransomware Attack, Customer Data Breach) when they have distinct response requirements. Note: fraud events that generate detection alerts are captured as FRAUD_ALERT entities; use INCIDENT_TYPE for system, security, data, and operational failures, not for fraud alert events.
    example type values: cybersecurity_incident | data_breach | system_outage | physical_security | performance_degradation | integration_failure | backup_failure | credential_compromise | ransomware | operational_failure

  SEVERITY_LEVEL
    A defined incident severity tier with quantified impact thresholds (financial, customer scope, system downtime), specific response time targets, and mandatory escalation requirements. Each severity level is a separate entity.
    example type values: critical_p1 | high_p2 | medium_p3 | low_p4 | informational

  RESPONSE_ACTION
    A specific action, procedure, or step required during incident response, business continuity, or production operations. Includes detection steps, containment actions, notifications to send, recovery procedures, and post-incident reviews. Each distinct named action or phase is a separate entity.
    example type values: detection | containment | investigation | notification | escalation | recovery | post_incident_review | regulatory_notification | customer_notification | system_restore | access_revocation | forensics

  NOTIFICATION_CONTACT
    A named contact, team, regulator, or external party that must be notified under specific conditions — with contact details, trigger conditions, and required timeframes when stated. Extract from escalation lists, emergency contacts, and regulatory notification requirements.
    example type values: internal_team | executive | regulator | law_enforcement | customer | external_partner | media_spokesperson | legal_counsel | insurance_provider

  CUSTOMER_GUIDE_ITEM
    A piece of customer-facing guidance from the welcome pack or customer reference materials — explaining how to use an account feature, how to contact the bank, what to expect during onboarding, or how a product works. Each distinct guidance point or section is a separate entity.
    example type values: getting_started | account_management | feature_guide | contact_info | regulatory_protection | security_guidance | opening_process | channel_guide | faq_reference | complaint_path

  CUSTOMER
    A bank customer referenced in reference materials — as the recipient of a welcome pack, as a party to be notified during an incident, or as the holder of an account described in a rate schedule. Extract when the document addresses the customer directly or defines obligations toward them.
    example type values: new_customer | account_holder | joint_holder | notified_customer | affected_customer

  ACCOUNT
    A customer account referenced in reference materials — the account type covered by a rate entry, the account affected by an incident, or the account described in a welcome pack. Extract when the account is the subject of operational reference information.
    example type values: savings_account | current_account | joint_account | affected_account | new_account

  TRANSACTION
    A financial event referenced in reference materials — transactions affected by an incident, suspicious transactions triggering an incident type, or transaction types described in a welcome pack or rate schedule.
    example type values: affected_transaction | suspicious_transaction | standing_order_payment | direct_debit_payment | disputed_transaction

  PRODUCT
    A banking product referenced in a rate schedule, incident scope, or welcome pack. Extract when the product is the primary subject or the governing context of a reference document entry.
    example type values: smartsaver_account | current_account | mortgage | card_product

  CARD
    A payment card referenced in incident response (card compromise, card fraud) or in welcome pack guidance (card usage, card limits, lost or stolen card procedure).
    example type values: debit_card | card_compromise | contactless | card_limit | replacement_card

  FRAUD_ALERT
    A fraud event or fraud detection mechanism referenced in incident response plans — the alert that triggers an incident response or the fraud pattern being responded to.
    example type values: fraud_incident | account_takeover | card_fraud_event | transaction_fraud | identity_fraud

  STANDING_ORDER
    A standing order referenced in a welcome pack or customer guide — how to set one up, how to cancel, what happens if a payment fails.
    example type values: standing_order_setup | standing_order_cancellation | payment_failure_guidance

  DIRECT_DEBIT
    A direct debit referenced in a welcome pack or customer guide — the mandate process, the Direct Debit Guarantee, how to cancel, and how to dispute a payment.
    example type values: direct_debit_mandate | dd_guarantee | dd_cancellation | dd_dispute

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  EXTRACTION RULES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. COMPLETENESS OVER PRECISION
     When in doubt whether something qualifies, include it.
     It is easier to remove an entity in validation than to recover a missed one.

  2. CANONICAL NAMES
     Use the most complete, formal name as the entity name.
     For RATE_ENTRY: include the product, tier, and rate in the name.
     RIGHT:   { "name": "SmartSaver Account Tier 1 Rate — 4.50% AER (£0–£10,000), effective 2026-01-15" }
     For SEVERITY_LEVEL: include the level name and its key threshold.
     RIGHT:   { "name": "Severity 1 (Critical) — >£100,000 impact or >4-hour system outage" }
     For INCIDENT_TYPE: use the exact category name from the document.
     RIGHT:   { "name": "Cybersecurity Incident", "aliases": ["Malware", "Ransomware Attack"] }

  3. DESCRIPTION QUALITY
     Write descriptions as an operations manager would — specific to what THIS document says. Include timeframes, financial thresholds, affected systems, and required actions when stated.

  4. CONTEXT SNIPPETS
     Extract 2–4 verbatim quotes from the text that best characterise this entity.
     Preserve exact wording. These are used for RAG enrichment.

  5. DO NOT HALLUCINATE
     Only extract what is in the text. Never invent rates, incident types, or contact details not stated in the passage.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT FORMAT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of entity objects:

  {
    "id":                string,   // generate as {type_abbr}_{sequence}
                                   // e.g., "rat_001", "inc_002", "sev_003", "res_004", "not_005", "cgi_006"
    "name":              string,   // canonical name — informative, not just labels
    "aliases":           array,    // short codes, category labels, document IDs
    "entity_class":      string,   // RATE_ENTRY | INCIDENT_TYPE | SEVERITY_LEVEL | RESPONSE_ACTION | NOTIFICATION_CONTACT | CUSTOMER_GUIDE_ITEM
    "type":              string,   // the subtype from lists above
    "description":       string,   // 2–4 sentence summary specific to this document
    "context":           array,    // verbatim text snippets where entity appears
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ Each interest rate tier captured as a separate RATE_ENTRY with product and rate value?
    □ Each incident category captured as a separate INCIDENT_TYPE?
    □ Each severity level captured as a separate SEVERITY_LEVEL with impact threshold?
    □ Each named response phase captured as a RESPONSE_ACTION?
    □ All notification contacts captured as NOTIFICATION_CONTACT?
    □ All distinct customer guidance sections captured as CUSTOMER_GUIDE_ITEM?
    □ RATE_ENTRY names include product, tier, rate value, and effective date?
    □ SEVERITY_LEVEL names include severity number and key threshold?
    □ Context snippets are verbatim from text?
    □ Every entity genuinely significant (no noise)?

  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __text__

  {text}

properties_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational reference document analysis.
  Your job is to read a FirstUK Bank reference document passage and enrich the provided entities with detailed properties based on the text.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  PROPERTIES MAP GUIDANCE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  There is NO fixed schema for properties. You decide what matters based on
  the entity's role in the document.

  Ask yourself: "If a staff member or customer needed to act on this entity right now,
  what structured facts from this document would be most useful?"

  For RATE_ENTRY, consider:
    - product_id (e.g., SAV-001)
    - product_name (e.g., SmartSaver Account)
    - rate_value (numeric, e.g., 4.50)
    - rate_format (AER | Gross | APR)
    - balance_min (lower bound of balance range)
    - balance_max (upper bound, or "unlimited")
    - effective_date (when this rate applies from)
    - next_review_date (when rate is next reviewed)
    - rate_basis (formula, e.g., "BoE Base Rate + 2.50% margin")
    - current_boe_rate (Bank of England base rate at time of publication)
    - calculation_example (the example from the document verbatim)
    - accrual_method (daily | monthly)
    - payment_frequency (monthly | annual)

  For INCIDENT_TYPE, consider:
    - category (the top-level category this falls under)
    - subtypes (list of specific scenarios in this category)
    - indicators (how this incident type is detected)
    - typical_impact (what tends to be affected)
    - regulatory_reporting_required (yes/no and which regulator)
    - customer_notification_required (yes/no and when)
    - primary_response_team (who handles first)

  For SEVERITY_LEVEL, consider:
    - level_number (1, 2, 3, 4)
    - severity_label (Critical | High | Medium | Low)
    - financial_impact_threshold (e.g., ">£100,000")
    - customer_scope_threshold (e.g., ">1,000 customers")
    - system_downtime_threshold (e.g., ">4 hours")
    - response_time_target (how quickly response must begin)
    - escalation_required_to (roles that must be notified)
    - regulatory_notification_required (yes/no)
    - examples (list of incidents at this severity)

  For RESPONSE_ACTION, consider:
    - action_phase (detection | containment | investigation | recovery | post_incident)
    - actor (who performs this action)
    - timeline (when it must be done, e.g., "within 1 hour")
    - mandatory_for_severities (which severity levels require this action)
    - tools_or_systems (what tools are used)
    - output_or_artifact (what is produced by this action)
    - escalation_trigger (if this action reveals more than expected, what happens)

  For NOTIFICATION_CONTACT, consider:
    - contact_name_or_role (the specific contact or role)
    - contact_method (phone | email | in_person | portal)
    - contact_details (phone number or email if stated)
    - trigger_condition (when this contact must be notified)
    - notification_timeframe (regulatory deadline, e.g., "within 72 hours for GDPR breach")
    - required_information (what must be communicated)
    - jurisdiction (UK | EU | international, if regulatory)

  For CUSTOMER_GUIDE_ITEM, consider:
    - topic (what this guide section covers)
    - target_customer (new customer | existing | joint account holder)
    - key_points (list of main guidance points)
    - relevant_channels (how the guidance applies across channels)
    - action_required (what the customer must do)
    - contact_for_help (support channel referenced)
    - related_product (which product this guidance applies to)

  For CUSTOMER, consider:
    - customer_context (new customer welcome, incident-affected, rate schedule holder)
    - notification_obligation (whether the bank must notify this customer and when)
    - affected_by (incident type or rate change that affects them)

  For ACCOUNT, consider:
    - account_type (savings | current | joint)
    - rate_applicable (rate schedule entry that applies to this account)
    - incident_impact (how this account type is affected by an incident)
    - welcome_pack_coverage (whether this account type is covered by welcome pack guidance)

  For TRANSACTION, consider:
    - transaction_context (incident trigger, rate calculation basis, guide topic)
    - affected_in_incident (whether this transaction type is disrupted by an incident)
    - guide_topic (what welcome pack says about this transaction type)

  For PRODUCT, consider:
    - product_id (e.g., SAV-001)
    - rate_entries (list of rate entries associated with this product)
    - welcome_pack_section (which welcome pack section covers this product)

  For CARD, consider:
    - card_context (incident response for card compromise, welcome pack usage guide)
    - daily_limit (as stated in the reference document)
    - loss_report_guidance (what the welcome pack says about lost or stolen cards)

  For FRAUD_ALERT, consider:
    - incident_type (the incident type that generates a fraud alert)
    - response_required (what the incident response plan requires)
    - customer_notification (whether customers must be notified and when)

  For STANDING_ORDER, consider:
    - guide_topic (what the welcome pack says about setting up a standing order)
    - setup_steps (how to create a standing order as described)
    - cancellation_process (how to cancel)
    - failure_guidance (what happens and what customer should do if payment fails)

  For DIRECT_DEBIT, consider:
    - guide_topic (what the welcome pack says about direct debits)
    - mandate_process (how a direct debit mandate is set up)
    - dd_guarantee (what the Direct Debit Guarantee covers)
    - cancellation_process (how to cancel a direct debit)
    - dispute_process (how to dispute an incorrect direct debit payment)

  KEY RULES FOR PROPERTIES:
    1. Use clear, readable key names (e.g., "financial_impact_threshold" not "fin_thresh")
    2. Use arrays for multiple values
    3. Use nested objects only when genuinely needed
    4. Omit a property entirely rather than writing null or "unknown"
    5. Values should be specific to THIS document, not generic definitions
    6. Keep individual values concise
    7. If a property feels forced or uncertain, leave it out

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of objects:
  {
    "id":            string,   // entity id from input
    "name":          string,   // entity name from input
    "properties":    object,   // enriched properties map
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Example of extracted "properties":
  "properties": {
    "product_id": "SAV-001",
    "product_name": "SmartSaver Account",
    "rate_value": 4.50,
    "rate_format": "AER",
    "balance_min": "£0",
    "balance_max": "£10,000",
    "effective_date": "2026-01-15",
    "rate_basis": "Bank of England Base Rate + 2.50% margin",
    "current_boe_rate": "4.00%",
    "calculation_example": "£10,000 × 4.50% ÷ 365 days × 30 days = £36.99",
    "accrual_method": "daily",
    "payment_frequency": "monthly"
  }
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ No hallucinated properties?
    □ RATE_ENTRY entities include rate_value, balance range, effective_date, rate_basis?
    □ SEVERITY_LEVEL entities include level_number, impact thresholds, response_time_target?
    □ INCIDENT_TYPE entities include subtypes, indicators, primary_response_team?
    □ RESPONSE_ACTION entities include actor, timeline, mandatory_for_severities?
    □ Properties genuinely useful — not just restating the entity name?

  Extract properties for the following __list_of_entities__ from the __text__ below.
  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __list_of_entities__
  {entities_list}

  __text__
  {text}

relationships_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational reference document analysis.
  Your job is to identify and extract all meaningful relationships between entities in a FirstUK Bank reference document.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  RELATIONSHIP STRUCTURE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  All relationships must follow this pattern:
  (EntityA)-[RELATES_TO {
    rel_type:      string  (semantic classifier, e.g., "higher_tier_than", "triggers", "requires")
    description:   string  (human-readable summary of this specific relationship)
    properties:    object  (flexible, rel_type-specific details)
  }]->(EntityB)

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  COMMON rel_type VALUES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  RATE_ENTRY ↔ RATE_ENTRY:
    higher_tier_than, adjacent_to, applies_same_basis_as, supersedes

  RATE_ENTRY ↔ CUSTOMER_GUIDE_ITEM:
    explained_in, referenced_by, illustrated_by

  INCIDENT_TYPE ↔ SEVERITY_LEVEL:
    classified_at, typically_reaches, can_escalate_to

  INCIDENT_TYPE ↔ RESPONSE_ACTION:
    triggers, requires, initiates, mandates

  INCIDENT_TYPE ↔ NOTIFICATION_CONTACT:
    requires_notification_of, escalated_to, reported_to

  INCIDENT_TYPE ↔ INCIDENT_TYPE:
    can_lead_to, related_to, subtype_of, co_occurs_with

  SEVERITY_LEVEL ↔ RESPONSE_ACTION:
    requires, mandates_escalation_to, triggers

  SEVERITY_LEVEL ↔ NOTIFICATION_CONTACT:
    requires_notification_of, escalates_to

  SEVERITY_LEVEL ↔ SEVERITY_LEVEL:
    escalates_to, more_severe_than

  RESPONSE_ACTION ↔ RESPONSE_ACTION:
    followed_by, preceded_by, triggered_by, parallel_to, enables

  RESPONSE_ACTION ↔ NOTIFICATION_CONTACT:
    notifies, involves, escalates_to

  NOTIFICATION_CONTACT ↔ NOTIFICATION_CONTACT:
    reports_to, escalates_to, coordinates_with

  CUSTOMER_GUIDE_ITEM ↔ CUSTOMER_GUIDE_ITEM:
    related_to, leads_to, prerequisite_for

  CUSTOMER_GUIDE_ITEM ↔ NOTIFICATION_CONTACT:
    refers_customer_to, escalates_to

  RATE_ENTRY ↔ PRODUCT:
    applies_to, earned_on, published_for

  RATE_ENTRY ↔ ACCOUNT:
    applies_to_account_type, determines_interest_on

  RATE_ENTRY ↔ CUSTOMER:
    applicable_to, earned_by

  INCIDENT_TYPE ↔ CUSTOMER:
    requires_notification_of, affects, triggers_communication_to

  INCIDENT_TYPE ↔ ACCOUNT:
    affects, may_trigger_freeze_of, disrupts_operations_on

  INCIDENT_TYPE ↔ TRANSACTION:
    disrupts, may_involve_suspicious, triggers_investigation_of

  INCIDENT_TYPE ↔ CARD:
    may_compromise, triggers_block_of, involves

  INCIDENT_TYPE ↔ FRAUD_ALERT:
    triggers, classified_as, corresponds_to

  SEVERITY_LEVEL ↔ CUSTOMER:
    determines_notification_obligation_toward, triggers_communication_to

  RESPONSE_ACTION ↔ CUSTOMER:
    notifies, communicates_to, protects

  RESPONSE_ACTION ↔ ACCOUNT:
    freezes, restores, investigates

  RESPONSE_ACTION ↔ CARD:
    blocks, replaces, investigates

  RESPONSE_ACTION ↔ FRAUD_ALERT:
    responds_to, investigates, closes

  CUSTOMER_GUIDE_ITEM ↔ ACCOUNT:
    provides_guidance_on, explains_management_of

  CUSTOMER_GUIDE_ITEM ↔ PRODUCT:
    explains_features_of, guides_use_of

  CUSTOMER_GUIDE_ITEM ↔ CARD:
    explains_usage_of, guides_management_of

  CUSTOMER_GUIDE_ITEM ↔ STANDING_ORDER:
    explains_setup_of, guides_management_of

  CUSTOMER_GUIDE_ITEM ↔ DIRECT_DEBIT:
    explains_setup_of, guides_management_of, describes_guarantee_of

  CUSTOMER_GUIDE_ITEM ↔ TRANSACTION:
    explains_processing_of, describes_monitoring_of

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  EXTRACTION RULES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. EXPLICIT AND IMPLICIT
     Extract both directly stated relationships ("Severity 1 requires executive notification")
     and those clearly implied ("Ransomware is a type of Cybersecurity Incident" → subtype_of).

  2. INCIDENT RESPONSE CHAINS ARE CORE
     For incident response documents, the most important structure is:
     INCIDENT_TYPE classified_at SEVERITY_LEVEL, SEVERITY_LEVEL requires RESPONSE_ACTION,
     RESPONSE_ACTION notifies NOTIFICATION_CONTACT.
     Always capture these chains — they answer "what do I do if ransomware hits?"

  3. RATE TIER ORDERING
     For rate schedule documents, capture the tier ordering:
     RATE_ENTRY higher_tier_than RATE_ENTRY across all adjacent tiers.
     This enables "which rate tier am I in?" queries.

  4. MULTIPLE EDGES ALLOWED
     An incident type can require multiple response actions and multiple notifications.
