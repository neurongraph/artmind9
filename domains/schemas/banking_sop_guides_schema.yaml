name: banking_sop_guides
description: Standard Operating Procedures, step-by-step process guides, and escalation matrices for FirstUK Bank operational workflows — covering account opening, KYC verification, AML screening, account closure, standing orders, direct debits, change of address, and exception handling.

entities_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational procedure analysis.
  Your job is to read a passage from a FirstUK Bank SOP or guide document and identify all significant entities.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ENTITY TYPES YOU MUST EXTRACT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Use ONLY these entity_classes. However, you can add more to the type values than the examples provided here.

  PROCESS
    A named end-to-end procedure, SOP, or operational workflow — the whole thing as a unit. Extract it once, including its purpose, scope, channel, and timeline. Each distinct named process is a separate entity (e.g., "Account Opening Process" and "KYC Verification Process" are separate).
    example type values: account_opening | kyc_verification | aml_screening | account_closure | standing_order_setup | direct_debit_setup | escalation_procedure | change_of_address | exception_handling | fraud_investigation | complaint_resolution

  PROCESS_STEP
    A discrete, named action or stage within a process — something that gets done by a specific actor at a specific point. Each numbered or bulleted step that represents a distinct action or review stage is a separate entity. Do not collapse multiple distinct steps into one.
    example type values: data_collection | document_verification | identity_check | address_verification | system_recording | risk_assessment | approval_decision | notification | quality_check | card_issuance | account_activation | investigation | reporting

  ROLE_ACTOR
    A person, team, or system responsible for executing process steps, making decisions, or receiving notifications. Include both human roles (Branch Staff, Compliance Officer) and automated actors (Fraud Detection Engine, AML System) when they perform process actions. Name the role as stated in the document.
    example type values: branch_staff | compliance_staff | operations_staff | customer_service | branch_manager | department_head | financial_crime_team | executive_committee | automated_system | external_regulator | customer

  DECISION_POINT
    A branching condition in a process where different paths are taken depending on the outcome — an approve/reject gate, a risk level split, an escalation trigger, or a pass/fail check. Capture what is being decided and what each outcome path leads to.
    example type values: approve_reject | escalate_or_resolve | pass_fail | risk_level_gate | authority_limit_check | exception_trigger | fraud_flag | compliance_gate | timeout_check

  ESCALATION_LEVEL
    A defined tier in an escalation matrix with specific authority, approval limits, response time, and ownership. Each numbered level (Level 1, Level 2, etc.) is a separate entity.
    example type values: frontline | supervisor | department_head | executive | board | regulator | financial_ombudsman | law_enforcement

  COMPLIANCE_CHECKPOINT
    A mandatory regulatory or policy gate that must be formally passed before a process can proceed — the control point in a workflow where compliance is verified and the outcome recorded. Use this entity for the gate itself (was this obligation satisfied? what was the outcome?), not the underlying entity being checked. KYC_VERIFICATION, AML_SCREENING, SAR, and FRAUD_ALERT are first-class entities that capture what is being executed; COMPLIANCE_CHECKPOINT captures the process gate that verifies their completion before the workflow advances.
    example type values: pep_screening | sanctions_check | risk_classification | data_protection_check | regulatory_reporting | document_retention | gdpr_check | beneficial_owner_check | credit_check

  CUSTOMER
    A bank customer as the primary subject of a process or SOP — the person whose application is being processed, account being opened, identity being verified, or complaint being resolved. Extract when the customer is the direct subject of process steps.
    example type values: applicant | existing_customer | joint_applicant | high_risk_customer | complaining_customer

  ACCOUNT
    A customer account being created, modified, or closed by the process. Extract when the SOP describes steps that act directly on an account — opening, activating, freezing, closing, or updating account records.
    example type values: new_account | active_account | dormant_account | frozen_account | closing_account | joint_account

  TRANSACTION
    A financial event being processed, investigated, or monitored as part of a procedure. Extract when the SOP includes steps for authorising, flagging, reversing, or investigating transactions.
    example type values: monitored_transaction | suspicious_transaction | failed_transaction | reversed_transaction | investigated_transaction

  PRODUCT
    A banking product referenced as the context or outcome of a process — the product type that defines which account is being opened or which rules apply throughout the SOP.
    example type values: smartsaver_account | current_account | joint_account | mortgage | card_product

  CARD
    A payment card being issued, blocked, or replaced as part of a process. Extract when the SOP includes steps for card issuance, activation, cancellation, or replacement.
    example type values: card_issuance | card_activation | card_block | card_replacement | card_cancellation

  KYC_VERIFICATION
    The KYC process as executed within a procedure — the specific verification steps, documents collected, system records updated, and outcomes (passed/failed/escalated). Extract when the SOP defines KYC execution steps distinct from the compliance checkpoint gate.
    example type values: identity_verification_step | address_verification_step | document_collection | kyc_system_recording | kyc_outcome | periodic_refresh

  AML_SCREENING
    AML screening as executed within a procedure — the specific lists checked, match review steps, escalation triggers, and system records. Extract when the SOP defines AML screening execution steps.
    example type values: sanctions_screening_step | pep_screening_step | match_review | escalation_trigger | screening_outcome | ongoing_monitoring_setup

  SAR
    A Suspicious Activity Report as filed within a procedure — the steps for identifying, documenting, and submitting a SAR to the NCA. Extract when the SOP defines the SAR filing process as a sequence of actions.
    example type values: sar_preparation | sar_submission | internal_disclosure | nca_filing | sar_confidentiality | post_filing_monitoring

  FRAUD_ALERT
    A fraud alert being generated, reviewed, or actioned as part of a procedure. Extract when the SOP defines steps for handling, investigating, or escalating fraud alerts.
    example type values: alert_generation | alert_review | alert_escalation | fraud_investigation_step | customer_notification | alert_closure

  IDENTIFICATION_DOCUMENT
    An official identity document collected and verified during a process — the document types accepted, the validation checks required, and the recording obligations. Extract when the SOP specifies document collection or verification steps.
    example type values: passport_verification | driving_licence_check | national_id_check | proof_of_address | document_recording | expiry_check

  ADDRESS
    A customer address collected, verified, or updated during a process — address verification steps, acceptable proof of address documents, or change of address procedures.
    example type values: address_verification_step | proof_of_address | address_update | address_recording | change_of_address

  ACCOUNT_HOLDER
    A person being added, verified, or updated as an account holder during a process — primary holder onboarding, joint holder addition, or holder removal steps.
    example type values: primary_holder_setup | joint_holder_addition | holder_verification | holder_removal | signatory_update

  JOINT_ACCOUNT
    A joint account arrangement being established or modified during a process — the specific steps for verifying both holders, obtaining dual consents, and recording joint account status.
    example type values: joint_account_opening | dual_kyc_step | joint_holder_consent | joint_account_closure | interest_split_setup

  STANDING_ORDER
    A standing order being created, amended, or cancelled during a process. Extract when the SOP defines steps for setting up, modifying, validating, or cancelling standing orders.
    example type values: standing_order_creation | standing_order_amendment | standing_order_cancellation | beneficiary_validation | payment_failure_handling

  DIRECT_DEBIT
    A direct debit mandate being set up, amended, or cancelled during a process. Extract when the SOP defines steps for processing direct debit authorisations, amendments, or cancellations under the Direct Debit Guarantee.
    example type values: dd_mandate_setup | dd_mandate_cancellation | dd_dispute_handling | indemnity_claim | dd_reinstatement

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  EXTRACTION RULES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. COMPLETENESS OVER PRECISION
     When in doubt whether something qualifies, include it.
     It is easier to remove an entity in validation than to recover a missed one.

  2. CANONICAL NAMES
     Use the most complete, formal name as the entity name.
     Store abbreviations and informal names in aliases.
     RIGHT:   { "name": "KYC Document Verification Step", "aliases": ["Step 2", "Document Check"] }
     WRONG:   { "name": "Step 2" }
     For ESCALATION_LEVEL: include the level number and authority in the name.
     RIGHT:   { "name": "Level 2 — Supervisor/Manager Resolution" }

  3. DESCRIPTION QUALITY
     Write descriptions as an operations analyst would — specific to what THIS document says about how the step, role, or checkpoint works. Include timelines, channels, and conditions when stated.

  4. CONTEXT SNIPPETS
     Extract 2–4 verbatim quotes from the text that best characterise this entity.
     Preserve exact wording. These are used for RAG enrichment.

  5. DO NOT HALLUCINATE
     Only extract what is in the text. Never invent steps, roles, or timelines not present in the passage.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT FORMAT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of entity objects:

  {
    "id":                string,   // generate as {type_abbr}_{sequence}
                                   // e.g., "prc_001", "stp_002", "rol_003", "dec_004", "esc_005", "chk_006"
    "name":              string,   // canonical name (descriptive, not just "Step 1")
    "aliases":           array,    // step numbers, document IDs, alternate labels
    "entity_class":      string,   // PROCESS | PROCESS_STEP | ROLE_ACTOR | DECISION_POINT | ESCALATION_LEVEL | COMPLIANCE_CHECKPOINT
    "type":              string,   // the subtype from lists above
    "description":       string,   // 2–4 sentence summary specific to this document
    "context":           array,    // verbatim text snippets where entity appears
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ The overall process captured as a PROCESS entity?
    □ Each distinct named step captured as a PROCESS_STEP?
    □ All roles performing or approving steps captured as ROLE_ACTOR?
    □ All branch points and approval gates captured as DECISION_POINT?
    □ Each escalation tier captured as a separate ESCALATION_LEVEL?
    □ All regulatory checks (KYC, AML, sanctions) captured as COMPLIANCE_CHECKPOINT?
    □ Canonical names are descriptive, not just step numbers?
    □ Context snippets are verbatim from text?
    □ Every entity genuinely significant (no noise)?

  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __text__

  {text}

properties_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational procedure analysis.
  Your job is to read a FirstUK Bank SOP or guide document passage and enrich the provided entities with detailed properties based on the text.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  PROPERTIES MAP GUIDANCE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  There is NO fixed schema for properties. You decide what matters based on
  the entity's role in the document.

  Ask yourself: "If a compliance officer or branch manager needed to understand or execute
  this entity, what structured facts from this document would help them?"

  For PROCESS, consider:
    - document_id (e.g., ACCT-OPEN-SOP-001)
    - purpose (stated goal of the process)
    - scope (what it applies to — products, channels, customer types)
    - channels (branch | online | postal)
    - owner (role responsible for the process)
    - departments_involved (list)
    - timeline_sla (expected completion time)
    - regulatory_references (list of regulations it satisfies)
    - trigger (what initiates the process)
    - outcome_success (what success looks like)
    - outcome_failure (what failure leads to)

  For PROCESS_STEP, consider:
    - step_number (ordinal position in the process)
    - actor (who performs this step)
    - input (what information or artifact is needed)
    - output (what is produced)
    - estimated_duration (time for this step)
    - channel (branch | online | system | manual)
    - mandatory (yes/no)
    - tools_or_systems (systems used in this step)
    - failure_path (what happens if this step fails)

  For ROLE_ACTOR, consider:
    - role_type (human | system | external)
    - department (which department this role belongs to)
    - authority_level (what decisions they can make)
    - approval_limit (financial or operational limit)
    - response_time_sla (expected response time in this context)
    - channels (how they interact — phone | branch | system | email)

  For DECISION_POINT, consider:
    - decision_question (what is being decided)
    - criteria (what determines the outcome)
    - decision_maker (who or what makes the decision)
    - path_yes (what happens on approval/pass)
    - path_no (what happens on rejection/fail)
    - override_possible (can a higher authority override the decision)
    - time_limit (how long before escalation)

  For ESCALATION_LEVEL, consider:
    - level_number (1, 2, 3, 4, etc.)
    - authority (role with authority at this level)
    - approval_limit (financial ceiling, e.g., "£500–£5,000")
    - response_time (SLA for resolution at this level)
    - examples (types of issues handled at this level)
    - escalation_trigger (condition that causes escalation to NEXT level)
    - escalates_to (the next level up)

  For COMPLIANCE_CHECKPOINT, consider:
    - checkpoint_name (formal name)
    - regulatory_basis (FCA COBS, MLR 2017, GDPR, POCA, etc.)
    - mandatory (yes — always required, or conditional)
    - applies_to_channels (branch | online | all)
    - evidence_required (what documents or system records are needed)
    - performed_by (role responsible)
    - timing (when in the process it must occur)
    - refresh_frequency (if periodic — e.g., every 3–5 years for KYC)
    - failure_consequence (what happens if checkpoint fails)
    - system_used (which system records the checkpoint)

  For CUSTOMER, consider:
    - customer_type (applicant | existing | joint | high_risk)
    - process_role (the subject of the SOP — whose application is being processed)
    - data_collected (personal data fields captured during this process)
    - notification_required (whether and when the customer must be informed of outcomes)

  For ACCOUNT, consider:
    - account_type (savings | current | joint)
    - account_state_at_start (new | existing | dormant | frozen)
    - account_state_at_end (active | closed | frozen | suspended)
    - system_recorded_in (which system holds the account record)

  For TRANSACTION, consider:
    - transaction_type (monitored | suspicious | failed | reversed)
    - monitoring_trigger (what pattern or threshold triggers review)
    - investigation_steps (how the transaction is investigated in the SOP)
    - outcome_paths (what happens on completion — cleared, flagged, reversed)

  For PRODUCT, consider:
    - product_id (e.g., SAV-001)
    - product_type (savings | current | joint | mortgage | card)
    - determines_process_variant (whether the product type changes which steps apply)

  For CARD, consider:
    - card_state (issuance | activation | blocked | replacement)
    - issuance_steps (steps for issuing and activating the card)
    - block_trigger (what event causes the SOP to block a card)
    - system_used (which system manages card status)

  For KYC_VERIFICATION, consider:
    - verification_steps (specific actions in the KYC execution — collect, verify, record)
    - documents_required (which identity documents are collected)
    - system_used (which system records the KYC outcome)
    - pass_criteria (what constitutes a passed KYC)
    - failure_path (what happens if KYC cannot be completed)
    - refresh_trigger (what event initiates a KYC refresh)

  For AML_SCREENING, consider:
    - screening_steps (specific actions — which lists checked, how matches are reviewed)
    - escalation_trigger (what match score or indicator triggers escalation)
    - system_used (which AML system performs the screening)
    - pass_criteria (what constitutes a passed AML screen)
    - failure_path (what happens if a match is confirmed)

  For SAR, consider:
    - preparation_steps (how the SAR is documented before submission)
    - submission_method (how the SAR is filed — internal MLRO, then NCA)
    - confidentiality_obligation (tipping-off prohibition steps)
    - post_filing_steps (what happens after SAR is submitted)
    - deadline (time from suspicion to internal filing)

  For FRAUD_ALERT, consider:
    - alert_trigger (what generates the fraud alert in the SOP)
    - review_steps (how the alert is reviewed and categorised)
    - escalation_path (when and to whom the alert is escalated)
    - customer_contact_steps (whether and how the customer is notified)
    - closure_criteria (what constitutes a resolved alert)

  For IDENTIFICATION_DOCUMENT, consider:
    - accepted_types (which document types are acceptable in this SOP)
    - collection_steps (how documents are obtained from the customer)
    - verification_steps (how authenticity is checked)
    - recording_obligation (where and how the document is recorded in the system)
    - expiry_check (whether expiry date must be validated)

  For ADDRESS, consider:
    - collection_steps (how the address is captured)
    - verification_steps (how the address is verified — utility bill, credit bureau)
    - acceptable_proof (what documents are accepted as proof of address)
    - recording_system (where the address is recorded)
    - update_process (steps for processing a change of address)

  For ACCOUNT_HOLDER, consider:
    - holder_type (primary | joint | secondary)
    - onboarding_steps (steps for verifying and adding a holder)
    - kyc_requirement (whether this holder type requires individual KYC)
    - authority_recorded (what authorisations are set up in the system)
    - removal_process (steps for removing a holder if applicable)

  For JOINT_ACCOUNT, consider:
    - dual_verification_steps (steps for verifying both holders independently)
    - consent_capture (how joint consent is obtained and recorded)
    - interest_split_setup (how interest allocation is configured)
    - closure_steps (steps for closing a joint account with dual consent)

  For STANDING_ORDER, consider:
    - creation_steps (steps for setting up a standing order)
    - beneficiary_validation (how the beneficiary account is validated)
    - amendment_steps (steps for modifying an existing standing order)
    - cancellation_steps (steps for cancelling a standing order)
    - failure_handling (steps when a standing order payment fails)
    - system_used (which system manages standing orders)

  For DIRECT_DEBIT, consider:
    - mandate_setup_steps (steps for processing a direct debit mandate)
    - mandate_validation (how the mandate is verified)
    - cancellation_steps (steps for cancelling under the Direct Debit Guarantee)
    - dispute_steps (steps for handling an incorrect direct debit payment)
    - indemnity_process (steps for reclaiming an incorrect payment)
    - system_used (which system manages direct debit mandates)

  KEY RULES FOR PROPERTIES:
    1. Use clear, readable key names (e.g., "regulatory_basis" not "reg_b")
    2. Use arrays for multiple values
    3. Use nested objects only when genuinely needed
    4. Omit a property entirely rather than writing null or "unknown"
    5. Values should be specific to THIS document, not generic definitions
    6. Keep individual values concise
    7. If a property feels forced or uncertain, leave it out

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of objects:
  {
    "id":            string,   // entity id from input
    "name":          string,   // entity name from input
    "properties":    object,   // enriched properties map
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Example of extracted "properties":
  "properties": {
    "level_number": 2,
    "authority": "Supervisor, Branch Manager, Complaints Handler",
    "approval_limit": "£500–£5,000",
    "response_time": "1–3 business days",
    "examples": ["complaint investigation", "non-standard fee reversal", "customer retention offer"],
    "escalation_trigger": "unresolved or financial impact >£5,000",
    "escalates_to": "Level 3 — Department Head Resolution"
  }
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ No hallucinated properties?
    □ PROCESS entities include document_id, scope, timeline_sla?
    □ ESCALATION_LEVEL entities include level_number, approval_limit, response_time, escalation_trigger?
    □ COMPLIANCE_CHECKPOINT entities include regulatory_basis, mandatory, evidence_required?
    □ DECISION_POINT entities include decision_question, path_yes, path_no?
    □ Properties genuinely useful — not just restating the entity name?

  Extract properties for the following __list_of_entities__ from the __text__ below.
  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __list_of_entities__
  {entities_list}

  __text__
  {text}

relationships_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking operational procedure analysis.
  Your job is to identify and extract all meaningful relationships between entities in a FirstUK Bank SOP or guide document.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  RELATIONSHIP STRUCTURE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  All relationships must follow this pattern:
  (EntityA)-[RELATES_TO {
    rel_type:      string  (semantic classifier, e.g., "contains", "performed_by", "routes_to")
    description:   string  (human-readable summary of this specific relationship)
    properties:    object  (flexible, rel_type-specific details)
  }]->(EntityB)

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  COMMON rel_type VALUES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  PROCESS ↔ PROCESS_STEP:
    contains, starts_with, ends_with, triggers, includes_optional

  PROCESS ↔ ROLE_ACTOR:
    owned_by, executed_by, approved_by, notifies

  PROCESS ↔ DECISION_POINT:
    includes, branches_at, concludes_at

  PROCESS ↔ COMPLIANCE_CHECKPOINT:
    requires, mandated_to_include, triggered_by

  PROCESS ↔ ESCALATION_LEVEL:
    routes_to, defined_in

  PROCESS_STEP ↔ PROCESS_STEP:
    followed_by, preceded_by, triggered_by, parallel_to, alternative_to

  PROCESS_STEP ↔ ROLE_ACTOR:
    performed_by, reviewed_by, approved_by, notifies, escalated_to

  PROCESS_STEP ↔ DECISION_POINT:
