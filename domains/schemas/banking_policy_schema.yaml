  EXTRACTION RULES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. EXPLICIT AND IMPLICIT
     Extract both directly stated relationships ("AML Policy mandated by MLR 2017")
     and those clearly implied ("SAR filing required within 30 days" → POLICY_PROVISION implements REGULATORY_REFERENCE).

  2. POLICY → REGULATORY CHAIN IS CORE
     The most important structure in policy documents is:
     POLICY mandated_by REGULATORY_REFERENCE, POLICY addresses RISK_CATEGORY,
     POLICY requires CONTROL_MEASURE, CONTROL_MEASURE mitigates RISK_CATEGORY.
     Always capture these chains.

  3. MULTIPLE EDGES ALLOWED
     A policy provision can implement multiple regulations and mitigate multiple risks.
     Create a separate edge for each combination.

  4. ACCOUNTABILITY CHAINS
     For role responsibilities, capture: ROLE owned_by POLICY, ROLE reports_to ROLE,
     ROLE performs CONTROL_MEASURE. These enable queries like "who is responsible for sanctions screening?"

  5. PROPERTIES MAP
     The properties object is flexible and rel_type-specific. Examples:

     For "mandated_by": { obligation_type: string, section_reference: string }
     For "mitigated_by": { mitigation_strength: "primary | supplementary", mandatory: boolean }
     For "assigns_responsibility_to": { obligation: string, timeframe: string }
     For "implements": { implementation_method: string, frequency: string }

