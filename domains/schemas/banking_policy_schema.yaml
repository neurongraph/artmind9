name: banking_policy
description: Formal policy documents for FirstUK Bank covering AML/CFT, customer identification (KYC), fraud prevention, information security, privacy (GDPR), complaints handling, operational risk, and data retention — establishing mandatory obligations, controls, regulatory references, and accountability.

entities_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking policy document analysis.
  Your job is to read a passage from a FirstUK Bank formal policy document and identify all significant entities.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ENTITY TYPES YOU MUST EXTRACT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Use ONLY these entity_classes. However, you can add more to the type values than the examples provided here.

  POLICY
    A named formal policy document — the policy itself as a governing instrument, with its scope, owner, regulatory basis, and version. Each distinct policy document is one POLICY entity. Also extract policy-level principles or statements that define the bank's stance on a domain.
    example type values: aml_policy | kyc_policy | fraud_policy | information_security | privacy | complaints | operational_risk | data_retention | credit_risk | conduct

  POLICY_PROVISION
    A specific rule, requirement, obligation, prohibition, or standard stated within a policy. Extract provisions that represent discrete, actionable mandates — things that staff must do, must not do, or must ensure. Each distinct provision is a separate entity. Do not collapse a set of requirements into one vague provision.
    example type values: mandatory_requirement | prohibition | obligation | reporting_obligation | record_retention_rule | training_requirement | review_schedule | notification_rule | response_timeframe | approval_requirement

  REGULATORY_REFERENCE
    A law, regulation, regulatory directive, external standard, sanctions list, or guidance document that the policy must comply with or is derived from. Include both the formal document name and the issuing authority when both are stated. Each distinct regulation is a separate entity.
    example type values: legislation | regulation | regulatory_guidance | international_standard | sanctions_list | industry_code | directive | rulebook

  RISK_CATEGORY
    A named type of risk, threat, or financial crime scenario that the policy is designed to address or mitigate. Capture how the policy defines or characterises each risk type.
    example type values: money_laundering | terrorist_financing | sanctions_violation | fraud | data_breach | operational_risk | credit_risk | reputational_risk | information_security_risk | compliance_risk | unauthorized_access

  CONTROL_MEASURE
    A specific operational safeguard, monitoring mechanism, or protective tool required by the policy — the "how" through which compliance obligations are implemented. Note: KYC_VERIFICATION and AML_SCREENING are first-class entities covering those processes; use CONTROL_MEASURE for the operational mechanisms and technical tools that implement them (e.g., transaction monitoring systems, access controls, encryption, dual authorisation gates).
    example type values: transaction_monitoring | access_control | authentication | record_keeping | staff_training | audit_logging | incident_reporting | approval_gate | data_encryption | penetration_testing | dual_authorisation | data_masking

  ROLE_RESPONSIBILITY
    An abstract role, committee, or staff collective with explicitly defined accountability, obligations, or authority under this policy. Extract the role title and the specific responsibilities assigned to it. Note: named individual employees (e.g., "Head of Financial Crime") are extracted as EMPLOYEE entities. Named organisational departments (e.g., "Financial Crime Department") are extracted as DEPARTMENT entities. Use ROLE_RESPONSIBILITY for abstract roles (MLRO, Data Protection Officer), staff collectives (all staff, customer-facing staff), regulatory bodies, and cross-functional committees.
    example type values: policy_owner | mlro | data_protection_officer | all_staff | board_committee | risk_committee | external_regulator | third_party_processor | data_subject

  CUSTOMER
    A bank customer referenced as the subject of a policy obligation, restriction, or protection. Extract when the policy defines duties, rights, or controls that apply to customers directly.
    example type values: individual_customer | high_risk_customer | pep_customer | joint_account_holder | prospective_customer

  ACCOUNT
    A customer account referenced in policy obligations — account opening requirements, account freezing conditions, or closure procedures. Extract when the policy mandates controls over accounts.
    example type values: savings_account | current_account | joint_account | frozen_account | closed_account | new_account

  TRANSACTION
    A financial event referenced in a policy obligation — transactions requiring monitoring, reporting thresholds, or suspicious activity triggers. Extract when the policy defines transaction-level controls or reporting requirements.
    example type values: suspicious_transaction | high_value_transaction | cash_transaction | monitored_transaction | reported_transaction

  PRODUCT
    A banking product referenced as being subject to policy requirements — AML obligations, KYC requirements, or fraud controls that apply to specific products.
    example type values: savings_account_product | current_account_product | joint_account_product | card_product

  CARD
    A payment card referenced in fraud policy — card fraud scenarios, card blocking procedures, or dispute obligations.
    example type values: debit_card | card_fraud_scenario | contactless | card_block | replacement_procedure

  KYC_VERIFICATION
    The Know Your Customer verification process as mandated by policy — the specific verification requirements, timing, and consequences of failure. Extract when the policy defines or mandates KYC controls.
    example type values: identity_verification | address_verification | enhanced_due_diligence | periodic_refresh | document_collection

  AML_SCREENING
    Anti-Money Laundering screening as mandated by policy — the specific screening requirements, lists to be checked, thresholds, and escalation obligations. Extract when the policy defines AML screening controls.
    example type values: sanctions_screening | pep_screening | adverse_media_check | ongoing_monitoring | transaction_monitoring

  SAR
    A Suspicious Activity Report as mandated by policy — the obligation to file, the filing deadline, the confidentiality requirement, and the consequence of failure. Extract when the policy defines SAR obligations.
    example type values: sar_obligation | sar_filing_deadline | sar_confidentiality | internal_sar | external_sar

  FRAUD_ALERT
    A fraud detection alert or fraud response as defined by policy — the obligation to generate, investigate, or respond to fraud alerts. Extract when the policy mandates fraud detection or response controls.
    example type values: fraud_detection_obligation | fraud_investigation | customer_reimbursement | card_block | account_freeze

  IDENTIFICATION_DOCUMENT
    An official identity document required by policy for KYC purposes — the types accepted, validity requirements, and verification obligations. Extract when the policy specifies acceptable document types or document-handling obligations.
    example type values: passport | driving_licence | national_id | proof_of_address | utility_bill | document_retention

  ACCOUNT_HOLDER
    A person with legal rights over an account as referenced in policy — joint account holders, secondary holders, or beneficial owners requiring due diligence. Extract when the policy defines obligations that apply to account holders specifically.
    example type values: primary_holder | joint_holder | beneficial_owner | signatory | power_of_attorney

  JOINT_ACCOUNT
    A joint account arrangement referenced in policy — the specific due diligence, liability, and disclosure obligations that apply when an account has multiple holders.
    example type values: joint_and_several | joint_aml_obligation | joint_disclosure | joint_kyc_requirement | joint_closure

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  EXTRACTION RULES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. COMPLETENESS OVER PRECISION
     When in doubt whether something qualifies, include it.
     It is easier to remove an entity in validation than to recover a missed one.

  2. CANONICAL NAMES
     Use the most complete, formal name as the entity name.
     Store short forms and document IDs in aliases.
     RIGHT:   { "name": "Money Laundering Regulations 2017", "aliases": ["MLR 2017", "MLR"] }
     WRONG:   { "name": "MLR 2017" }
     For POLICY_PROVISION: name it by what it requires, not just "Section 3.1".
     RIGHT:   { "name": "Mandatory AML Screening at Account Opening" }
     WRONG:   { "name": "Section 3.1 — Core Requirements" }

  3. DESCRIPTION QUALITY
     Write descriptions as a compliance officer would — specific to what THIS policy document says. Include mandatory/prohibited distinction, who it applies to, and any stated timeframes.

  4. CONTEXT SNIPPETS
     Extract 2–4 verbatim quotes from the text that best characterise this entity.
     Preserve exact wording — these are used for RAG enrichment.

  5. DO NOT HALLUCINATE
     Only extract what is in the text. Never invent regulatory references, risk types, or controls not stated in the passage.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT FORMAT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of entity objects:

  {
    "id":                string,   // generate as {type_abbr}_{sequence}
                                   // e.g., "pol_001", "prv_002", "reg_003", "rsk_004", "ctl_005", "rol_006"
    "name":              string,   // canonical name — descriptive for provisions, formal for regulations
    "aliases":           array,    // document IDs, short codes, section references
    "entity_class":      string,   // POLICY | POLICY_PROVISION | REGULATORY_REFERENCE | RISK_CATEGORY | CONTROL_MEASURE | ROLE_RESPONSIBILITY
    "type":              string,   // the subtype from lists above
    "description":       string,   // 2–4 sentence summary specific to this document
    "context":           array,    // verbatim text snippets where entity appears
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ The policy itself captured as a POLICY entity?
    □ Each distinct mandatory requirement extracted as a POLICY_PROVISION?
    □ All named regulations, laws, and directives captured as REGULATORY_REFERENCE?
    □ Each type of risk or financial crime the policy addresses captured as RISK_CATEGORY?
    □ All named controls, screening mechanisms, and safeguards captured as CONTROL_MEASURE?
    □ All named roles with defined responsibilities captured as ROLE_RESPONSIBILITY?
    □ POLICY_PROVISION names are descriptive (not just section numbers)?
    □ REGULATORY_REFERENCE uses full formal names?
    □ Context snippets are verbatim from text?

  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __text__

  {text}

properties_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking policy document analysis.
  Your job is to read a FirstUK Bank policy document passage and enrich the provided entities with detailed properties based on the text.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  PROPERTIES MAP GUIDANCE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  There is NO fixed schema for properties. You decide what matters based on
  the entity's role in the document.

  Ask yourself: "If a compliance officer or auditor needed to verify compliance with
  this entity, what structured facts from this document would help them?"

  For POLICY, consider:
    - document_id (e.g., AML-POL-002)
    - policy_domain (aml | fraud | privacy | etc.)
    - owner (role responsible for the policy)
    - owning_department (department)
    - effective_date
    - review_date (next scheduled review)
    - audience (who must comply)
    - regulatory_basis (list of underpinning regulations)
    - scope_summary (what it applies to and what is excluded)
    - core_policy_statement (the key stance or commitment)
    - version

  For POLICY_PROVISION, consider:
    - provision_type (mandatory | prohibited | conditional | periodic)
    - applies_to (roles, channels, products, or customer types it applies to)
    - timeframe (any deadline, frequency, or retention period stated)
    - consequence_of_breach (what happens if not met)
    - verification_method (how compliance is checked)
    - regulatory_source (the regulation requiring this provision)
    - exceptions (any stated exceptions or waiver process)
    - linked_control (which control measure implements this)

  For REGULATORY_REFERENCE, consider:
    - issuing_authority (FCA, PRA, HMRC, EU Commission, etc.)
    - jurisdiction (UK | EU | international)
    - regulation_type (primary_legislation | secondary_legislation | regulatory_guidance | industry_standard | sanctions_list)
    - key_obligation (the core obligation it imposes on the bank)
    - effective_date (when it came into force)
    - how_cited (how this document references it)
    - consequences_of_breach (regulatory penalties or enforcement actions)

  For RISK_CATEGORY, consider:
    - risk_definition (how the policy defines this risk)
    - examples (specific scenarios or patterns cited)
    - detection_mechanism (how the bank detects this risk)
    - risk_level (low | medium | high | critical)
    - required_response (what the policy requires when this risk is identified)
    - reporting_obligation (who must be notified)

  For CONTROL_MEASURE, consider:
    - control_type (preventive | detective | corrective | directive)
    - mandatory (yes/no)
    - frequency (real-time | daily | monthly | annual | at_onboarding | periodic)
    - performed_by (role or system)
    - applies_to (which risks or processes it addresses)
    - evidence_required (what records must be kept)
    - escalation_path (what happens if control fails or flags a hit)
    - technology_used (system or tool if mentioned)

  For ROLE_RESPONSIBILITY, consider:
    - role_title (exact role as stated)
    - department (which department this role sits in)
    - specific_obligations (list of what they must do under this policy)
    - authority (decisions they can make)
    - accountability_for (what they are held responsible for)
    - reporting_to (who they report to under this policy)
    - training_required (any stated training obligations)

  For CUSTOMER, consider:
    - eligibility_status (prospective | existing | high_risk | pep | sanctioned)
    - obligations_under_policy (what the policy requires of or about customers)
    - rights_under_policy (protections the policy affords to customers)
    - risk_treatment (how the policy classifies or treats this customer type)

  For ACCOUNT, consider:
    - account_type (savings | current | joint)
    - policy_controls (what the policy mandates about this account type)
    - freeze_conditions (circumstances under which the account must be frozen)
    - closure_conditions (policy-mandated closure triggers)

  For TRANSACTION, consider:
    - reporting_threshold (monetary value that triggers a reporting obligation)
    - monitoring_obligation (what the policy requires be monitored)
    - suspicious_indicators (patterns defined as suspicious in the policy)
    - required_response (what must be done when a flagged transaction is identified)

  For PRODUCT, consider:
    - applicable_policy (which policy or obligation applies to this product)
    - kyc_requirement (whether KYC is mandatory for this product)
    - aml_requirement (AML screening obligation for this product)
    - risk_classification (product's risk level under the policy)

  For CARD, consider:
    - fraud_scenario (types of card fraud the policy addresses)
    - block_conditions (when the policy requires a card to be blocked)
    - dispute_obligation (customer rights or bank obligations in card disputes)
    - reimbursement_timeframe (how quickly fraud reimbursements must be made)

  For KYC_VERIFICATION, consider:
    - mandatory (yes — always required at account opening)
    - timing (when KYC must be completed relative to account opening)
    - refresh_frequency (how often KYC must be refreshed)
    - edd_trigger (conditions requiring Enhanced Due Diligence)
    - consequence_of_failure (what happens if KYC cannot be completed)
    - document_retention (how long KYC records must be kept)

  For AML_SCREENING, consider:
    - mandatory (yes — required at account opening and ongoing)
    - screening_lists (which lists must be checked per the policy)
    - ongoing_monitoring (whether continuous monitoring is required)
    - hit_response (what must be done if a screening match is found)
    - regulatory_basis (which regulation mandates this screening)

  For SAR, consider:
    - filing_obligation (mandatory — when suspicion arises)
    - filing_deadline (time limit from date of suspicion)
    - recipient (NCA or internal MLRO first)
    - confidentiality_rule (customer must not be tipped off)
    - consequence_of_non_filing (regulatory breach, criminal liability)

  For FRAUD_ALERT, consider:
    - generation_trigger (what must trigger a fraud alert)
    - investigation_obligation (how quickly investigation must begin)
    - customer_notification (whether and when customer must be told)
    - reimbursement_obligation (bank liability for unauthorised fraud)
    - reimbursement_timeframe (deadline for reimbursement)

  For IDENTIFICATION_DOCUMENT, consider:
    - accepted_types (list of documents the policy accepts for KYC)
    - validity_requirements (expiry, condition, issuing country)
    - verification_method (physical inspection, digital check, database)
    - retention_period (how long the document or record must be kept)
    - exception_handling (what to do if a customer cannot provide standard documents)

  For ACCOUNT_HOLDER, consider:
    - due_diligence_requirement (KYC/AML obligations for each holder)
    - liability_under_policy (individual or joint liability stated in policy)
    - beneficial_owner_disclosure (whether beneficial ownership must be declared)
    - power_of_attorney_rules (any policy provisions for authorised representatives)

  For JOINT_ACCOUNT, consider:
    - dual_kyc_requirement (both holders must pass KYC individually)
    - dual_aml_requirement (both holders must pass AML screening)
    - liability_type (joint and several — both liable for all obligations)
    - closure_consent (both holders must consent to closure)
    - disclosure_obligation (both holders entitled to account information)

  KEY RULES FOR PROPERTIES:
    1. Use clear, readable key names (e.g., "regulatory_source" not "reg_src")
    2. Use arrays for multiple values
    3. Use nested objects only when genuinely needed
    4. Omit a property entirely rather than writing null or "unknown"
    5. Values should be specific to THIS document, not generic definitions
    6. Keep individual values concise
    7. If a property feels forced or uncertain, leave it out

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  OUTPUT:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Return a JSON array of objects:
  {
    "id":            string,   // entity id from input
    "name":          string,   // entity name from input
    "properties":    object,   // enriched properties map
  }

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Example of extracted "properties":
  "properties": {
    "document_id": "AML-POL-002",
    "owner": "Head of Financial Crime",
    "owning_department": "Financial Crime",
    "effective_date": "2026-01-15",
    "audience": ["All Staff", "Compliance", "Risk", "Retail Banking"],
    "regulatory_basis": ["Money Laundering Regulations 2017", "POCA 2002", "Terrorism Act 2000", "FCA COBS Part 10"],
    "core_policy_statement": "FirstUK Bank does not knowingly provide banking services to individuals or entities engaged in or suspected of money laundering, terrorist financing, sanctions violations, or other financial crime."
  }
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  QUALITY CHECKLIST:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Before responding, verify:
    □ No hallucinated properties?
    □ POLICY entities include document_id, regulatory_basis, core_policy_statement?
    □ POLICY_PROVISION entities include provision_type, applies_to, consequence_of_breach?
    □ REGULATORY_REFERENCE entities include issuing_authority, jurisdiction, key_obligation?
    □ CONTROL_MEASURE entities include control_type, frequency, performed_by?
    □ Properties genuinely useful — not just restating the entity name?

  Extract properties for the following __list_of_entities__ from the __text__ below.
  Return only the JSON array. No preamble. No explanation. No markdown code fences.

  __list_of_entities__
  {entities_list}

  __text__
  {text}

relationships_prompt: |
  You are a Knowledge Graph extraction engine specialised in banking policy document analysis.
  Your job is to identify and extract all meaningful relationships between entities in a FirstUK Bank policy document.

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  RELATIONSHIP STRUCTURE:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  All relationships must follow this pattern:
  (EntityA)-[RELATES_TO {
    rel_type:      string  (semantic classifier, e.g., "mandated_by", "mitigates", "owned_by")
    description:   string  (human-readable summary of this specific relationship)
    properties:    object  (flexible, rel_type-specific details)
  }]->(EntityB)

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  COMMON rel_type VALUES:
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  POLICY ↔ REGULATORY_REFERENCE:
    mandated_by, implements, complies_with, derived_from, references, supersedes_prior_guidance

  POLICY ↔ POLICY_PROVISION:
    contains, establishes, mandates, prohibits, reviews

  POLICY ↔ RISK_CATEGORY:
    addresses, mitigates, governs_response_to, scoped_to

  POLICY ↔ CONTROL_MEASURE:
    requires, mandates, references, delegates_to_sop

  POLICY ↔ ROLE_RESPONSIBILITY:
    assigns_responsibility_to, owned_by, approved_by, applies_to

  POLICY_PROVISION ↔ REGULATORY_REFERENCE:
    implements, derived_from, satisfies

  POLICY_PROVISION ↔ RISK_CATEGORY:
    addresses, triggered_by, targets

  POLICY_PROVISION ↔ CONTROL_MEASURE:
    implemented_by, enforced_through, requires

  POLICY_PROVISION ↔ ROLE_RESPONSIBILITY:
    applies_to, enforced_by, reported_to

  POLICY_PROVISION ↔ POLICY_PROVISION:
    exception_to, overrides, related_to, strengthened_by

  REGULATORY_REFERENCE ↔ RISK_CATEGORY:
    addresses, regulates, defines_response_to

  REGULATORY_REFERENCE ↔ CONTROL_MEASURE:
    mandates, specifies, requires

  REGULATORY_REFERENCE ↔ ROLE_RESPONSIBILITY:
    imposes_obligation_on, designates

  RISK_CATEGORY ↔ CONTROL_MEASURE:
    mitigated_by, detected_by, prevented_by, responded_to_by

  RISK_CATEGORY ↔ RISK_CATEGORY:
    related_to, escalates_to, co_occurs_with

  CONTROL_MEASURE ↔ ROLE_RESPONSIBILITY:
    performed_by, reviewed_by, escalated_to, owned_by

  CONTROL_MEASURE ↔ CONTROL_MEASURE:
    precedes, triggered_by, complements, replaced_by

  ROLE_RESPONSIBILITY ↔ ROLE_RESPONSIBILITY:
    reports_to, escalates_to, oversees, advises

  POLICY ↔ CUSTOMER:
    governs_treatment_of, assigns_obligations_toward, protects

  POLICY ↔ ACCOUNT:
    governs_opening_of, mandates_controls_on, governs_closure_of

  POLICY ↔ TRANSACTION:
    mandates_monitoring_of, requires_reporting_of, governs

